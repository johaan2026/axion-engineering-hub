<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Searchable mechanical engineering formula library with equations, variables, and applications." />
    <title>Formula Library | Axion Engineering Suite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body data-page="formulas" class="app-shell">
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <div id="site-header"></div>

    <main id="main-content" class="app-main page-section">
      <div class="container">
        <header class="page-header animate-in">
          <span class="page-header__eyebrow">Reference</span>
          <h1 class="page-header__title">Formula Library</h1>
          <p class="page-header__subtitle">
            Equations, variables, units, and applications for everyday mechanical engineering work.
          </p>
        </header>

        <div class="search-bar animate-in animate-in--delay-1" style="margin-bottom: 2rem; max-width: 32rem;">
          <svg class="search-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <label class="sr-only" for="formula-search">Search formulas</label>
          <input
            type="search"
            id="formula-search"
            class="search-input"
            placeholder="Search by name, category, or equation…"
            autocomplete="off"
          />
        </div>

        <div id="formula-list" class="grid grid--2"></div>
        <p id="formula-empty" class="empty-state glass-panel" hidden>No formulas match your search.</p>
      </div>
    </main>

    <div id="site-footer"></div>
    <script type="module" src="../js/main.js"></script>
  </body>
</html>
